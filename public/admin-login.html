<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConvoHub — Administrator sign in</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <style>
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }
      .login-wrap {
        width: 100%;
        max-width: 380px;
      }
      .login-wrap h1 {
        margin: 0 0 0.35rem;
        font-size: 1.65rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }
      .login-wrap .tagline {
        margin: 0 0 1.5rem;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
      }
      .login-card {
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 1.35rem 1.25rem;
      }
      .login-card h2 {
        margin: 0 0 1rem;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--dim);
        font-weight: 600;
      }
      .auth-error {
        margin: 0 0 0.75rem;
        padding: 0.5rem 0.65rem;
        font-size: 12px;
        color: var(--text);
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
      }
      .auth-error.hidden {
        display: none;
      }
      .login-footer {
        margin: 1.25rem 0 0;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      .login-footer a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .login-footer a:hover {
        color: var(--text);
      }
    </style>
    <style>
      .login-page {
        background: var(--bg-app);
        background-image: radial-gradient(circle, #d1d1d6 0.7px, transparent 0.7px);
        background-size: 22px 22px;
      }
      .login-wrap {
        max-width: 540px;
      }
      .login-wrap h1 {
        letter-spacing: -0.3px;
        color: var(--text-primary);
        font-size: 2.1rem;
        margin-bottom: 0.55rem;
      }
      .login-wrap .tagline {
        font-size: 14px;
        margin-bottom: 2rem;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--border-light);
        border-radius: 22px;
        box-shadow: 0 20px 60px rgba(17, 24, 39, 0.14);
        backdrop-filter: blur(28px);
        padding: 1.7rem 1.5rem;
      }
      .login-card h2 {
        letter-spacing: 0.08em;
      }
      .login-card .field span {
        margin-bottom: 0.1rem;
      }
      .login-card .btn.primary {
        width: 100%;
        margin-top: 0.15rem;
        padding: 0.78rem 1rem;
      }
      .login-footer a {
        color: var(--accent-blue);
      }
      .login-footer a:hover {
        color: var(--accent-blue-hover);
      }
      @media (max-width: 640px) {
        .login-page {
          padding: 1rem 0.75rem;
        }
        .login-wrap {
          max-width: 100%;
        }
        .login-wrap h1 {
          font-size: 1.4rem;
        }
        .login-card {
          padding: 1rem 0.9rem;
          border-radius: var(--radius-md);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-wrap">
        <h1>ConvoHub</h1>
        <p class="tagline">Administrator sign in. You will open the admin dashboard after a successful login.</p>

        <div class="login-card">
          <h2>Administrator</h2>
          <p id="auth-error-admin" class="auth-error hidden" role="alert"></p>
          <form id="form-admin" class="stack" style="margin-top: 0">
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" required autocomplete="username" />
            </label>
            <label class="field">
              <span>Password</span>
              <input type="password" name="password" required autocomplete="current-password" />
            </label>
            <button type="submit" class="btn primary">Sign in</button>
          </form>
        </div>

        <p class="login-footer"><a href="/">Member sign-in</a></p>
      </div>
    </div>

    <script>
      (function () {
        function showErr(msg) {
          var el = document.getElementById("auth-error-admin");
          if (!el) return;
          if (!msg) {
            el.textContent = "";
            el.classList.add("hidden");
            return;
          }
          el.textContent = msg;
          el.classList.remove("hidden");
        }

        async function postLogin(url, email, password) {
          var r = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email: email.trim(), password: password }),
          });
          var data = await r.json().catch(function () {
            return {};
          });
          if (!r.ok) {
            var d = data.detail;
            var msg =
              typeof d === "string"
                ? d
                : d && typeof d === "object"
                  ? d.message || JSON.stringify(d)
                  : data.error || "Sign-in failed (" + r.status + ")";
            throw new Error(msg);
          }
          return data;
        }

        document.getElementById("form-admin").addEventListener("submit", async function (e) {
          e.preventDefault();
          showErr("");
          var fd = new FormData(e.target);
          try {
            await postLogin("/auth/login/admin", fd.get("email"), fd.get("password"));
            window.location.href = "/admin/dashboard";
          } catch (err) {
            showErr(err.message || String(err));
          }
        });

        fetch("/auth/session", { credentials: "include" })
          .then(function (r) {
            if (!r.ok) return;
            return r.json();
          })
          .then(function (d) {
            if (!d || !d.user) return;
            var role = String(d.user.role || "").toLowerCase();
            if (role === "admin" || role === "superadmin") window.location.replace("/admin/dashboard");
            else window.location.replace("/dashboard");
          })
          .catch(function () {});
      })();
    </script>
  </body>
</html>
